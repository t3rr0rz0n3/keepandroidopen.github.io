# Active translations for this locale:

title: "Keep Android Open"
description: "Предстои телефонът ви да спре да бъде ваш. През септември 2026 г. Google възнамерява да блокира всяко приложение за Android на разработчици, които не са регистрирани."

# Hero
hero_lede: "Предстои телефонът ви да спре да бъде ваш."
hero_countdown_label: "дни до заключването"
hero_sub: "През септември 2026 г. Google, без да иска съгласието на потребителите, публикува тихомълком актуализация, която ще **блокира всяко приложение за Android** на разработчици, които не са регистрирани в Google и не са подписали съответните договори, не са платили съответните суми и не са предоставили личен документ."
hero_kicker: "Всяко приложение и всяко устройство по целия свят и без опция за отказ."

# What Google is doing
what_heading: "Какво прави Google"
what_intro: "През август 2025 г. Google [обяви](https://developer.android.com/developer-verification) ново изискване: от септември 2026 г. **всеки разработчик на приложения за Android трябва да бъде централно регистриран в Google**, за да може софтуерът му да се инсталира на което и да е устройство. Не става въпрос само за приложения от Google Play Магазин, а за всички приложения. В това число влизат приложения, изпратени от приятели, разпространени през [F-Droid](https://f-droid.org), създадени от хоби разработчици за лична употреба. Всички независими разработчици, обществени и църковни групи и любители ще изгубят възможността да разработват и разпространяват софтуера си."
what_registration: "За регистрация е необходимо следното:"
what_req_fee: "Да се плати такса на Google"
what_req_terms: "Да се приемат Общите условия на Google"
what_req_id: "Да се предоставят собствени официални лични документи"
what_req_signing: "Да се предостави доказателство за вашия частен ключ за разработчик"
what_req_appids: "Да се посочат всички текущи и бъдещи идентификатори на приложения"
what_pullquote: "Ако разработчикът не се съгласи, приложенията му ще бъдат блокирани без известие на всяко устройство с Android навсякъде по света."

# Кой страда от това
impact_heading: "Кой страда от това"
impact_you_heading: "Вие"
impact_you_p1: "Когато сте си купили телефон с Android, сте очаквали да имате отворена система, в която можете да инсталирате каквото поискате. Това беше обещанието на Google."
impact_you_p2: >-
  Сега Google променя сделката със задна дата и то за устройства, които вече притежавате. След минаването на актуализацията ще можете да използвате само софтуер, който е предварително одобрен от Google. На вашия телефон, който *вие притежавате* и за който *вие сте платили*.
impact_dev_heading: "Независими разработчици"
impact_dev_p1: "Няма значение дали ще става въпрос първото приложение на тийнейджър, инструмент за запазване на поверителността на доброволец, или за поверителна вътрешна бета версия на компания. След септември 2026 г. нищо от това няма да може да се инсталира без благословията на Google."
impact_dev_p2: >-
  Според [F-Droid](https://f-droid.org), където се намират хиляди безплатни приложения за Android с отворен код, това е [„екзистенциална заплаха“](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow го нарича [„Darth Android“](https://pluralistic.net/2025/09/01/fulu/).
impact_gov_heading: "Правителствата и гражданските общества"
impact_gov_p1: >-
  Google има [документирани случаи](https://www.aclu.org/news/free-speech/app-store-oligopoly), в които е изпълнявал исканията на авторитарни режими, когато става въпрос за премахването на приложения. Когато тази програма влезе в сила, софтуерът, който се използва от институциите във вашата държава, ще бъде зависим от решенията на една чуждестранна корпорация, която не подлежи на законовите изисквания на държавата ви.
impact_gov_p2: >-
  Фондация „Електронна граница“ ([EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship)) нарича тази форма на ограничаване на приложенията „непрестанно разширяващ се път към цензурата в интернет“."

# Advanced flow
flow_heading: "„Резервният вариант“ на Google е всъщност капан"
flow_intro: "Google твърди, че „power users“ (напреднали потребители) [„могат да продължат да инсталират“](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) непроверени приложения. Ето как *всъщност* изглежда това:"
flow_step1: "Ровите се в системните настройки, намирате опциите за разработчици"
flow_step2: "Докосвате номера на компилацията **седем пъти**, за да активирате режима за разработчици"
flow_step3: "Потвърждавате, че действате по собствено желание"
flow_step4: "Въвеждате PIN кода си"
flow_step5: "Рестартирате устройството"
flow_step6: "**Изчаквате 24 часа**"
flow_step7: "Връщате се и минавате още няколко изскачащи прозореца"
flow_step8: "Избирате „Разрешаване временно“ (7 дни) или „Разрешаване за постоянно“"
flow_step9: "Отново потвърждавате, че сте наясно с „рисковете“"
flow_summary: "Девет стъпки и задължителен 24-часов период на изчакване. *За да инсталирате софтуер на устройство, което притежавате.*"
flow_detail: "По-лошото: Този процес се извършва изцяло през **Google Play Services**, не през операционната система Android. Google може да го промени, да го ограничи или да го спре, когато пожелае, като за целта не е нужна актуализация на операционната система. И до днешна дата все още не присъства в beta версиите на Android, както и в каналите за разработчици или canary. Съществува само като публикация в блог и някои примерни модели."

# Precedent
precedent_heading: "Това е по-голямо от Android"
precedent_pullquote: "Ако Google има способността със задна дата да заключи милиарди устройства, които са били продадени като отворени платформи, това ще ангажира вниманието на всеки голям производител по света."
precedent_p1: "Така се установява нов принцип: **компанията, която е произвела устройството ви, има силата след като сте го купили да вземе решение какъв софтуер можете да използвате на него.** В света на софтуера това се нарича „rug pull“ (неочаквана тотална промяна на правилата), но поне винаги съществуваше възможността да инсталирате конкурентен софтуер. В света на хардуера това обаче ви изправя пред свършен факт, след който нямате ходове и не можете да противодействате на хрумванията на един доказан монополист, който не допуска свободен достъп и не може да бъде подведен под отговорност."
precedent_p2: >-
  Отвореният характер на Android никога не е бил просто особеност. Той беше *обещанието*, което го разграничаваше от iPhone и милиони потребители избираха Android точно поради тази причина. С действията си Google сега нарушава едностранно това обещание на устройства, които вече са *в джобовете* на потребителите, защото са решили, че имат достатъчно доминираща позиция на пазара и влияние върху регулаторите, за да го направят без последствия.
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *„Завистта на Google към Apple заплашва да унищожи наследството на Android като отворена операционна система.“*"

# Objections
objections_heading: "Добре, но това не е ли..."
obj_security_q: "„...само за нашата сигурност?“"
obj_security_a: >-
  Обяснението за сигурността е само пясък в очите. Google Play Protect вече извършва сканиране за злонамерен софтуер без значение от идентичността на разработчика. Изискването на официален документ за самоличност няма да направи кода по-безопасен, но за сметка на това прави *разработчиците* по-лесни за идентифициране и контрол. Създателите на злонамерен софтуер могат да се регистрират. Инди разработчиците и дисидентите често нямат тази възможност. Фондацията „Електронна граница“ *([EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship)) има недвусмислена позиция: системата за идентификация е инструмент за цензура, а не за сигурност.
obj_sideloading_q: "„...същото като инсталиране на външни приложения, просто със следване на разширената процедура?“"
obj_sideloading_a: >-
  Девет стъпки, 24-часов период на изчакване, ровене в настройки за разработчици и всичко това през собствена услуга, която Google може да анулира по всяко време. Това не е същото като инсталиране на външни приложения, а е **възпиращ механизъм**, който е така разработен, че да гарантира, че почти никой няма да го ползва. И понеже работи през Play Services, а не в рамките на операционната система, Google винаги може тихомълком да го ограничи или спре.
obj_hide_q: "„...проблем само ако имаш какво да криеш?“"
obj_hide_a: >-
  Информаторите, журналистите и активистите срещу авторитарно управление ще бъдат първите жертви на тази промяна. Ще ги последват хората, които са жертви на домашно насилие. Всички тези групи имат основателни причини да разпространяват или използват софтуер, без да въвеждат данните за идентичността си в база данни на Google. Приносът от анонимни потребители към отворен код е традиция, по-стара от самия Google. Тази политика ще убие всичко това на Android.
obj_apple_q: "„...същото, което и Apple прави?“"
obj_apple_a: >-
  Apple е затворена система от самото начало. Android беше избиран от потребителите, *защото беше различен*. „Apple прави същото“ е напълно безпредметен слаб аргумент, който само отнема вината от правилното място. А благодарение на натиска от регулаторите (Закона за дигиталните пазари на ЕС) дори Apple е принуден да работи по-отворено. За сметка на това Google се е насочил в обратната посока с опити да затвърди контрола си върху достъпа.
obj_cost_q: "„...просто 25 долара и малко документи?“"
obj_cost_a: >-
  Може би не е нещо особено за разработчик в САЩ, който има кредитна карта и собствен автомобил. Съвсем различно е обаче за един студент в Африка, или за дисидент в Мианмар, или за доброволец, който се грижи за здравно приложение за общността си. Цената не се измерва само във финансова величина. Давате данните от официалния си документ за самоличност и предоставяте доказателства за частния си ключ на компания, която [редовно изпълнява](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) исканията на различни правителства за премахване на приложения и разкриване на информация за разработчиците им.

# Fight back
act_heading: "Как да се противопоставим"
act_everyone_heading: "За всички"
act_fdroid: >-
  **[Инсталирайте F-Droid](https://f-droid.org)** на всяко устройство с Android, което притежавате. Алтернативните магазини за приложения ще оцелеят само ако има хора, които ги използват.
act_regulators: >-
  **[Свържете се със своите представители в регулаторните комисии.](/cta/#consumers)** Регулаторите по света са наистина загрижени за ефекта от монопола и централизирането на властта в технологичния сектор. Те приветстват обратна връзка от хора, които са потърпевши и имат свои притеснения.
act_share: >-
  **Споделяйте тази страница.** Изпращайте навсякъде връзката към [keepandroidopen.org](https://keepandroidopen.org).
act_astroturf: >-
  **Борете се с опитите за манипулиране на общественото мнение.** Все по-често се срещат мнения от рода на „От гледна точка на Google...“. Не им позволявайте да изменят фокуса.
act_petition: >-
  **[Подпишете петицията в change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** и станете част от другите 100 000 подписали.
act_letter: >-
  **[Прочетете и споделяйте нашето отворено писмо](/open-letter).**
act_survey: >-
  **Кажете на Google какво мислите за това**, като използвате тяхната [анкета за изискванията за проверка на разработчиците на Android](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(колкото и да е глас в пустинята)</small>.
act_dev_heading: "За разработчиците"
act_dev_intro: >-
  **НЕ УЧАСТВАЙТЕ.** Не се присъединявайте към програмата и не се записвайте в Android Developer Console. Не приемайте техните Общи условия, от които няма да можете после да се откажете. Не потвърждавайте самоличността си. *Не играйте по свирката им.*
act_dev_resist: "Планът на Google ще сработи само ако разработчиците се подчинят. Не го правете."
act_dev_talk: "Опитайте се да разубедите другите разработчици и организации около себе си да не се включват в програмата."
act_dev_warn: >-
  Добавете [библиотеката FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) към приложенията си, за да предупредите потребителите.
act_dev_banner: >-
  Имате уебсайт? [Добавете банера с обратно отброяване.](/banner)
act_google_heading: "За служители на Google"
act_google_text: >-
  Ако знаете нещо, свързано с техническото осъществяване на програмата или вътрешна информация, пишете на [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) от *неслужебно* устройство и акаунт, който не е на Gmail. Поверителността на вашата информация ще бъде строго защитена.

