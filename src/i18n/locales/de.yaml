social_callout_facebook_3: "Googles vorgeschlagene Umgehungslösung für die Installation nicht verifizierter Apps nach Inkrafttreten der Sperrung erfordert neun Schritte, eine obligatorische Wartezeit von 24 Stunden und läuft über Google Play-Dienste (die Google jederzeit ändern kann). Die Community wird gebeten, einen Blogbeitrag als Sicherheitsmaßnahme zu akzeptieren. {url}"
social_callout_facebook_4: "Androids Offenheit ist seit 17 Jahren sein prägendes Merkmal. Millionen von Nutzern haben es genau aus diesem Grund dem iPhone vorgezogen. Google schreibt nun die Registrierung aller Entwickler-Apps vor, auch jener, die außerhalb des Play Stores vertrieben werden. Unabhängige Entwickler und Open-Source-Projekte sind am stärksten betroffen. {url}"
social_callout_facebook_5: "Die EFF bezeichnet die App-Zugriffskontrolle als \"Einfallstor zur Zensur\". Googles Entwicklerverifizierung würde einem einzelnen Unternehmen die Möglichkeit geben, jede App von jedem Entwickler auf jedem zertifizierten Gerät weltweit zu blockieren. Dies schafft einen Präzedenzfall, der über Android hinaus die Zukunft des Personal Computing prägt. {url}"

