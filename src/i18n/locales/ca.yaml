social_callout_mastodon_5: "El registre obligatori genera preocupació per desenvolupadors anònims, països sancionats i eines de privadesa. Google ja té historial de complir amb governs per eliminar apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "La força d'Android era la seva descentralització. El pla de Google la destrueix imposant registre centralitzat. Cal resistir aquesta concentració de poder. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "Si has comprat el maquinari, hauries de decidir el programari. El pla de Google és un atac directe a la sobirania de l'usuari. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Imagina un món on cada desenvolupador amateur hagi de registrar-se en una corporació global per compartir la seva feina. Aquest és el futur que Google planteja per Android. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "El \"flux avançat\" de Google és un mecanisme dissuasiu, no una solució. 9 passos i 24 hores per instal·lar programari propi? No gràcies. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "Més de 100.000 persones i 67+ organitzacions s'oposen al bloqueig d'Android. Uneix-te a la lluita per un ecosistema mòbil realment obert. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_facebook_1: "A partir del setembre de 2026, Google exigirà que tots els desenvolupadors Android es registrin i proporcionin identificació oficial. Les apps de desenvolupadors no registrats seran bloquejades a tots els dispositius. Això afecta totes les apps, no només la Play Store. Més informació: {url}"
social_callout_facebook_2: "F-Droid considera la verificació de Google una \"amenaça existencial.\" més de 67 organitzacions com l'EFF o la FSF s'hi oposen. Descobreix per què és important: {url}"
social_callout_facebook_3: "El mètode de Google per instal·lar apps no verificades requereix 9 passos, 24 hores d'espera i depèn de Play Services. Només existeix com una promesa en un blog. {url}"
social_callout_facebook_4: "Android ha estat obert durant 17 anys. Ara Google obliga al registre de desenvolupadors per a totes les apps, fins i tot fora de la Play Store. Els més afectats seran els desenvolupadors independents i el codi obert. {url}"
social_callout_facebook_5: "L'EFF diu que el control d'apps és \"un camí cap a la censura.\" Google podria bloquejar qualsevol app en qualsevol dispositiu. Això afecta el futur de la informàtica personal. {url}"
social_callout_facebook_6: "El teu telèfon, la teva decisió? No si Google s'imposa. A partir de 2026, bloquejaran apps sense registre. Això ens afecta a tots. {url}"
social_callout_facebook_7: "Google està bloquejant retroactivament dispositius venuts com a oberts. Aquest \"rug pull\" afecta desenvolupadors independents i botigues com F-Droid. {url}"
social_callout_facebook_8: "El teu telèfon és realment teu? Si Google decideix què pots instal·lar, no ho és. Uneix-te a més de 100.000 persones. {url}"
social_callout_facebook_9: "El procés de 9 passos de Google és una trampa dissenyada perquè ningú el faci servir. Control total. {url}"
social_callout_facebook_10: "Des d'estudiants fins a voluntaris, la nova política de Google frenarà la innovació. Ajuda a mantenir Android obert! {url}"

