# What Google is doing
what_heading: "Què està fent Google"
what_intro: "L'agost de 2025, Google va [anunciar](https://developer.android.com/developer-verification) un nou requisit: a partir del setembre de 2026, **tots els desenvolupadors d'aplicacions d'Android hauran de registrar-se centralment amb Google** abans que el seu programari es pugui instal·lar en qualsevol dispositiu. No només les aplicacions de la Play Store: totes. Això inclou aplicacions compartides entre amics, distribuïdes a través de [F-Droid](https://f-droid.org), o creades per aficionats per a ús personal. Desenvolupadors independents, comunitats, organitzacions i aficionats quedaran exclosos de poder desenvolupar i distribuir el seu programari."
what_registration: "El registre requereix:"
what_req_fee: "Pagar una taxa a Google"
what_req_terms: "Acceptar els termes i condicions de Google"
what_req_id: "Lliurar una identificació oficial"
what_req_signing: "Proporcionar proves de la clau privada de signatura"
what_req_appids: "Llistar tots els identificadors d’aplicacions actuals i futurs"
what_pullquote: "Si un desenvolupador no compleix, les seves aplicacions es bloquegen silenciosament en tots els dispositius Android del món."

# Who this hurts
impact_heading: "A qui perjudica"
impact_you_heading: "Tu"
impact_you_p1: "Vas comprar un telèfon Android perquè Google deia que era obert. Podies instal·lar el que volguessis, i aquest era l'acord."
impact_you_p2: "Google està reescrivint aquest acord de manera retroactiva en el maquinari que ja tens. Després de l'actualització, només podràs executar programari que Google hagi aprovat prèviament. Al teu telèfon: *la teva* propietat, que *tu* has pagat."
impact_dev_heading: "Desenvolupadors independents"
impact_dev_p1: "La primera app d'un adolescent, una eina de privadesa creada per voluntaris o una beta interna confidencial. No importa. Després del setembre de 2026, cap d'aquestes es podrà instal·lar sense el vistiplau de Google."
impact_dev_p2: "[F-Droid](https://f-droid.org), que allotja milers d’aplicacions lliures i de codi obert, ho ha qualificatcom una [\"amenaça existencial\"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow ho anomena [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_gov_heading: "Governs i societat civil"
impact_gov_p1: "Google té un [historial documentat](https://www.aclu.org/news/free-speech/app-store-oligopoly) de complir quan règims autoritaris exigeixen eliminar aplicacions. Amb aquest programa, el programari que utilitzen les institucions del teu país dependrà del criteri d'una única corporació estrangera no responsable."
impact_gov_p2: "L'[EFF adverteix](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) que el control d’aplicacions és \"un camí cada cop més ampli cap a la censura a Internet\"."

# Advanced flow
flow_heading: "La \"via alternativa\" de Google és una trampa"
flow_intro: "Google diu que els \"usuaris avançats\" encara poden [\"instal·lar\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) aplicacions no verificades. Això és el que implica realment:"
flow_step1: "Entrar a la configuració del sistema i trobar les opcions de desenvolupador"
flow_step2: "Prémer el número de compilació **set vegades** per activar el mode desenvolupador"
flow_step3: "Ignorar advertències intimidatòries"
flow_step4: "Introduir el PIN"
flow_step5: "Reiniciar el dispositiu"
flow_step6: "**Esperar 24 hores**"
flow_step7: "Tornar-hi i ignorar més advertències"
flow_step8: "Triar \"permetre temporalment\" (7 dies) o \"permetre indefinidament\""
flow_step9: "Confirmar de nou que entens \"els riscos\""
flow_summary: "Nou passos. Una espera obligatòria de 24 hores. *Per instal·lar programari en un dispositiu teu.*"
flow_detail: "Encara pitjor: aquest procés depèn completament de **Google Play Services**, no del sistema Android. Google el pot modificar o eliminar en qualsevol moment, sense actualització del sistema ni consentiment. I a dia d'avui, no existeix en cap versió beta. Només és una entrada de blog i maquetes."

# Precedent
precedent_heading: "Això va més enllà d'Android"
precedent_pullquote: "Si Google pot bloquejar retroactivament milers de milions de dispositius venuts com a oberts, tots els fabricants del món estan observant."
precedent_p1: "El principi que s’estableix: **la companyia que fabrica el dispositiu decideix, després de comprar-lo, quin programari pots executar.** En programari això s'anomena \"aixecar la catifa\" (en anglès 'rug pull'); però almenys podies instal·lar alternatives. En maquinari és un fet consumat que et deixa sense control."
precedent_p2: "L'obertura d’Android no era només una característica. Era una promesa. Google ara la revoca unilateralment"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): \"L'enveja d'Apple per part de Google amenaça amb desmantellar el llegat obert d’Android.\""

# Objections
objections_heading: "Però espera, això no és..."
obj_security_q: "\"...només per seguretat?\""
obj_security_a: "El motiu de seguretat és una cortina de fum. Google Play Protect ja analitza el programari maliciós independentment de la identitat del desenvolupador. Exigir una identificació oficial no fa que el codi sigui més segur. Fa que els *desenvolupadors* siguin identificables i controlables. Els autors de malware es poden registrar. Els desenvolupadors independents i els dissidents sovint no poden. L'[EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) és clara: el control basat en la identitat és una eina de censura, no de seguretat."
obj_sideloading_q: "\"...encara es poden instal·lar apps amb el flux avançat?\""
obj_sideloading_a: "Nou passos, una espera de 24 hores, amagat dins les opcions de desenvolupador, i gestionat per un servei propietari que Google pot revocar quan vulgui. Això no és instal·lació manual. És un **mecanisme dissuasiu** dissenyat perquè gairebé ningú el completi. I com que depèn de Play Services i no del sistema operatiu, Google el pot restringir o eliminar silenciosament."
obj_hide_q: "\"...només és un problema si tens alguna cosa a amagar?\""
obj_hide_a: "Els denunciants, periodistes i activistes sota règims autoritaris seran les primeres víctimes. Les persones en situacions de violència domèstica vindran després. Tots aquests col·lectius tenen motius legítims per distribuir o utilitzar programari sense associar la seva identitat legal a una base de dades de Google. La contribució anònima al programari lliure és una tradició anterior a Google. Aquesta política l'elimina a Android."
obj_apple_q: "\"...és el mateix que fa Apple?\""
obj_apple_a: "Apple ha estat un ecosistema tancat des del principi. La gent va triar Android *precisament perquè era diferent*. \"Apple també ho fa\" és una carrera cap avall i un argument feble de tipus *tu quoque*. A més, sota pressió reguladora (com la Digital Markets Act de la UE), fins i tot Apple s’està veient obligada a obrir-se. Google es mou en la direcció contrària: reforçar encara més el seu control."
obj_cost_q: "\"...només són 25 $ i una mica de paperassa?\""
obj_cost_a: "Potser, si ets un desenvolupador als EUA amb targeta de crèdit i permís de conduir. Prova de ser un estudiant a l'Àfrica subsahariana, o un dissident a Myanmar, o un voluntari que manté una aplicació de salut comunitària. El cost no és només econòmic: estàs cedint la teva identificació oficial i proves de les teves claus de signatura a una empresa que [habitualment compleix](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) amb les demandes governamentals per eliminar aplicacions i exposar desenvolupadors."

# Fight back
act_heading: "Passa a l’acció"
act_everyone_heading: "Tothom"
act_fdroid: "**[Instal·la F-Droid](https://f-droid.org)** a tots els dispositius Android que tinguis. Les botigues alternatives només sobreviuen si la gent realment les utilitza."
act_regulators: "**[Contacta amb els teus reguladors.](/cta/#consumers)** Els reguladors d’arreu del món estan realment preocupats pels monopolis i la centralització del poder en el sector tecnològic, i volen escoltar directament les persones afectades i preocupades."
act_share: "**Comparteix aquesta pàgina.** Enllaça a [keepandroidopen.org](https://keepandroidopen.org) a tot arreu."
act_astroturf: "**Planta cara als astroturfers.** La gent del \"bé, en realitat...\" està molt activa. No deixis que controlin el relat."
act_petition: "**[Signa la petició a change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** i uneix-te a les més de 100.000 persones que ja han fet sentir la seva veu."
act_letter: "**[Llegeix i comparteix la nostra carta oberta](/open-letter)**"
act_survey: "**Digues a Google què en penses** a través del seu propi [formulari de verificació de desenvolupadors](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(pel que servirà)</small>."
act_dev_heading: "Desenvolupadors"
act_dev_intro: "<strong style=\"text-transform: uppercase;\">No us hi registreu.</strong> No participeu en el programa registrant-vos a la consola de desenvolupadors d'Android ni acceptant els seus termes i condicions irrevocables. No verifiqueu la vostra identitat. *No hi jugueu.*"
act_dev_resist: "El pla de Google només funciona si els desenvolupadors hi col·laboren. No ho feu."
act_dev_talk: "Convinceu altres desenvolupadors i organitzacions perquè no s’hi registrin."
act_dev_warn: "Afegiu la biblioteca [FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn) a les vostres aplicacions per avisar els usuaris."
act_dev_banner: "Tens una web? [Afegeix el bàner de compte enrere.](/banner)"
act_google_heading: "Treballadors de Google"
act_google_text: "Si coneixes detalls sobre la implementació tècnica del programa o les seves motivacions internes, contacta amb [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) des d'un dispositiu *no laboral* i un compte *que no sigui Gmail*. Confidencialitat absoluta garantida."

