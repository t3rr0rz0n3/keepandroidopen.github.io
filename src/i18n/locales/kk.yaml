# What Google is doing
what_heading: "Google не істеп жатыр"
what_intro: >-
  2025 жылдың тамызында Google жаңа талап [жариялады](https://developer.android.com/developer-verification): 2026 жылдың қыркүйегінен бастап **әрбір Android қосымша әзірлеушісі кез келген құрылғыға бағдарламасы орнатылар алдында Google-де орталықтан тіркелуі тиіс**. Бұл тек Play Store қосымшаларына емес — барлық қосымшаларға қатысты. Достарға таратылған, [F-Droid](https://f-droid.org) арқылы берілген немесе жеке пайдалану үшін жасалған қосымшалар да осыған кіреді. Тәуелсіз әзірлеушілер, шіркеу мен қоғамдастық топтары, хоббишілер — бәрі де өз бағдарламаларын жасау мен тарата алмайтын болады.
what_registration: "Тіркелу үшін қажет:"
what_req_fee: "Google-ге ақы төлеу"
what_req_terms: "Google пайдалану шарттарымен келісу"
what_req_id: "Мемлекеттік куәлігіңізді беру"
what_req_signing: "Жеке қол қою кілтіңізді растайтын дерек беру"
what_req_appids: "Бүгінгі және болашақтағы барлық қосымша идентификаторларын тізімдеу"
what_pullquote: "Егер әзірлеуші талаптарды орындамаса, оның қосымшалары дүниежүзіндегі барлық Android құрылғыларда үндемей бұғатталады."

# Who this hurts
impact_heading: "Бұл кімге зиян тигізеді"
impact_you_heading: "Сіз"
impact_you_p1: "Сіз Android телефон сатып алдыңыз, өйткені Google оның ашық екенін айтты. Қалаған нәрсеңізді орнатуға болады — шарт осылай болды."
impact_you_p2: >-
  Енді Google сол уәдеден бас тартып жатыр — сіз жеке сатып алған құрылғыда. Жаңарту орналғаннан кейін тек Google алдын ала рұқсат берген бағдарламаларды ғана іске қоса аласыз. Өз телефоныңызда: *сіздің* меншігіңізде, *сіз* ақша төлеген нәрседе.
impact_dev_heading: "Тәуелсіз әзірлеушілер"
impact_dev_p1: "Жасөспірімнің алғашқы қосымшасы, еріктінің құпиялылық құралы немесе компанияның жабық ішкі бета нұсқасы. Маңызы жоқ. 2026 жылдың қыркүйегінен кейін Google рұқсатынсыз ештеңені орнатуға болмайды."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org) — мыңдаған тегін ашық бастапқы кодты Android қосымшаларының ордасы — мұны [«тіршілікке қауіп»](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) деп атады. Кори Доктороу оны [«Дарт Android»](https://pluralistic.net/2025/09/01/fulu/) деп атайды.
impact_gov_heading: "Үкіметтер мен азаматтық қоғам"
impact_gov_p1: >-
  Google-дің авторитарлық режимдер қосымша жою талап еткенде орындайтынын [дәлелдейтін тарихы бар](https://www.aclu.org/news/free-speech/app-store-oligopoly). Бұл бағдарламамен бірге сіздің еліңіздің мекемелерін басқаратын бағдарлама есеп бермейтін бір шет елдік корпорацияның еркіне бағынады.
impact_gov_p2: >-
  [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) қосымша кіріс бақылауын «интернет цензурасына үздіксіз кеңейетін жол» деп атайды.

# Advanced flow
flow_heading: "Google-дің «шығу жолы» — тұзақ"
flow_intro: >-
  Google «озық пайдаланушылар» тексерілмеген қосымшаларды [«әлі де орната алады»](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) дейді. Ал бұл *шын мәнінде* қалай көрінеді:
flow_step1: "Жүйе параметрлеріне кіріп, Әзірлеуші параметрлерін табу"
flow_step2: "Әзірлеуші режимін қосу үшін нұсқа нөмірін **жеті рет** басу"
flow_step3: "Мәжбүрлеу туралы қорқыту экрандарын жабу"
flow_step4: "PIN-кодты енгізу"
flow_step5: "Құрылғыны қайта іске қосу"
flow_step6: "**24 сағат күту**"
flow_step7: "Оралып, тағы да қорқыту экрандарын жабу"
flow_step8: "«Уақытша рұқсат ету» (7 күн) немесе «Шексіз рұқсат ету» таңдау"
flow_step9: "«Тәуекелдерді» түсінетіндігіңізді қайта растау"
flow_summary: "Тоғыз қадам. Міндетті 24 сағаттық тыным. *Өз иелігіңіздегі құрылғыға бағдарлама орнату үшін.*"
flow_detail: >-
  Одан да жаманы: бұл процесс Android жүйесі арқылы емес, толығымен **Google Play Services** арқылы жүреді. Google оны кез келген уақытта жүйе жаңартуынсыз және келісімсіз өзгерте, қатайта немесе жоя алады. Бүгінгі күні ол ешбір бета, алдын ала немесе canary нұсқасында шықпаған. Тек блог жазбасы мен макет ретінде ғана бар.

# Precedent
precedent_heading: "Бұл Android-тан үлкен мәселе"
precedent_pullquote: "Егер Google ашық платформа ретінде сатылған миллиардтаған құрылғыларды кері бұғаттай алса, планетадағы әрбір аппараттық өндіруші мұны бақылап отыр."
precedent_p1: >-
  Қалыптасып жатқан принцип: **құрылғыңызды жасаған компания оны сатып алғаннан кейін қандай бағдарламаны іске қосуға болатынын шешеді.** Бағдарламалық жасақтамада мұны «rug pull» деп атайды; бірақ кем дегенде бәсекелес бағдарламаларды орнатуға болатын. Аппараттық жасақтамада бұл сіздің дербестігіңізді жойып, есеп бермейтін жалғыз бақылаушы — сотталған монополистің еркіне бағынуды білдіреді.
precedent_p2: >-
  Android-тың ашықтығы ешқашан тек бір мүмкіндік болған жоқ. Бұл оны iPhone-нан ерекшелендіретін *уәде* болды. Миллиондар дәл сол себептен Android таңдады. Google енді сол уәдеден бір жақты бас тартып жатыр — халықтың қалтасындағы *бар* құрылғыларда, өйткені нарықтық үстемдіктері реттеу жүйесін бағындыруға жетті деп санады.
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *«Google-дің Apple-ге деген қызғанышы Android-тың ашық мұрасын жоюға қауіп төндіруде.»*

# Objections
objections_heading: "Бірақ бұл..."
obj_security_q: "«...тек қауіпсіздік үшін ғана?»"
obj_security_a: >-
  Қауіпсіздік уәжі — көзбояушылық. Google Play Protect зиянды бағдарламаларды әзірлеуші жеке басынан тәуелсіз қазірдің өзінде тексереді. Мемлекеттік куәлік талабы кодты қауіпсіз етпейді — ол *әзірлеушілерді* анықтауға және бақылауға мүмкіндік береді. Зиянды бағдарлама авторлары тіркеле алады. Тәуелсіз әзірлеушілер мен диссиденттер — жиі жоқ. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) тура айтады: жеке сәйкестікке негізделген кіріс бақылауы — цензура құралы, қауіпсіздік құралы емес.
obj_sideloading_q: "«...кеңейтілген процесті пайдалансаңыз, sideloading мүмкін?»"
obj_sideloading_a: >-
  Тоғыз қадам, 24 сағаттық күту, Әзірлеуші параметрлеріне жасырылған, Google қашан болса да өшіре алатын меншікті қызмет арқылы жеткізіледі. Бұл sideloading емес. Бұл — ешкім аяқтамауын қамтамасыз ету үшін жасалған **тосқауыл механизмі**. Ол OS арқылы емес, Play Services арқылы жұмыс істейтіндіктен Google оны үндемей қатайта немесе жоя алады.
obj_hide_q: "«...жасырар нәрсеңіз болса ғана мәселе?»"
obj_hide_a: >-
  Авторитарлық үкіметтер астындағы ақпарат жариялаушылар, журналистер мен белсенділер бірінші жәбірленушілер болады. Үй ішілік зорлық-зомбылық жағдайындағылар одан кейін. Бұл топтардың барлығының өз заңи жеке басын Google дерекқорына енгізбестен бағдарлама тарату немесе пайдалану үшін заңды себептері бар. Анонимді ашық бастапқы код үлесі Google-дің өзінен де ескі дәстүр. Бұл саясат оны Android-та аяқтайды.
obj_apple_q: "«...Apple жасайтынмен бірдей?»"
obj_apple_a: >-
  Apple бастан аяқ жабық бақша болды. Адамдар Android-ты *ол өзгеше болғандықтан* таңдады. «Apple да солай жасайды» — ең нашарға бәсеке және нашар *tu quoque* дәлелі. Сонымен қатар реттеу қысымы (ЕО-ның Цифрлық нарықтар туралы заңы) тіпті Apple-ді ашылуға мәжбүр етуде. Google керісінше бағытта: кіріс бақылаушы мәртебесін одан сайын нығайтуға тырысуда.
obj_cost_q: "«...тек 25 доллар және бірнеше құжат?»"
obj_cost_a: >-
  Мүмкін, егер сіз кредит картасы мен жүргізуші куәлігі бар АҚШ-тағы әзірлеуші болсаңыз. Сахараның оңтүстігіндегі студент, Мьянмадағы диссидент немесе қоғамдық денсаулық қосымшасын қолдаушы ерікті болып көріңізші. Шығын тек қаржылық емес: сіз мемлекеттік куәлігіңіз бен қол қою кілттерінің дәлелін үкімет талаптарын [үнемі орындайтын](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) компанияға тапсыруыңыз керек болады.

# Fight back
act_heading: "Қарсы тұр"
act_everyone_heading: "Барлығына"
act_fdroid: >-
  Иелігіңіздегі барлық Android құрылғыға **[F-Droid орнатыңыз](https://f-droid.org)**. Баламалы дүкендер тек адамдар шынымен пайдаланса ғана өмір сүреді.
act_regulators: >-
  **[Реттеушілеріңізге хабарласыңыз.](/cta/#consumers)** Дүниежүзі бойынша реттеушілер технологиялық секторда монополиялар мен биліктің орталықтандырылуына шынымен алаңдаулы және зардап шеккен адамдардан тікелей хабар алғысы келеді.
act_share: >-
  **Бұл бетті таратыңыз.** [keepandroidopen.org](https://keepandroidopen.org) сілтемесін барлық жерде жіберіңіз.
act_astroturf: >-
  **Ақиқатты бұрмалаушыларға жол бермеңіз.** «Ал, негізінде...» деп сылтауратып, мәселені кішірейтетіндер желіде толып жүр. Олардың оқиғаны өз пайдасына бұруына мүмкіндік бермеңіз.
act_petition: >-
  **[change.org петициясына қол қойыңыз](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** және өз дауыстарын білдірген 100 000-нан астам қол қоюшыға қосылыңыз.
act_letter: >-
  **[Ашық хатымызды оқып, таратыңыз](/open-letter)**
act_survey: >-
  **Бұл туралы не ойлайтыныңызды Google-ге айтыңыз** — олардың өз [әзірлеушілерді тексеру сауалнамасы](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) арқылы <small>(қанша пайдасы болса да)</small>.
act_dev_heading: "Әзірлеушілерге"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Тіркелмеңіз.</strong> Android Developer Console-ге тіркеліп, олардың қайтарылмайтын пайдалану шарттарымен келісу арқылы бағдарламаға қосылмаңыз. Жеке басыңызды растамаңыз. *Олармен ойнамаңыз.*
act_dev_resist: "Google-дің жоспары тек әзірлеушілер бағынса жұмыс істейді. Бағынбаңыз."
