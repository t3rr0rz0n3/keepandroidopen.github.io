social_callout_mastodon_7: "Аппараттық жасақтаманы сатып алсаңыз, бағдарламалық жасақтама бойынша соңғы сөз сізде болуы керек. Google-дің тексерілмеген қосымшаларды бұғаттау жоспары пайдаланушы егемендігіне тікелей шабуыл. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Кез келген хоббишіл немесе еріктінің жұмысын бөлісу үшін жаһандық корпорацияда тіркелуі қажет болатын дүниені елестетіп көріңіз. Google 2026 жылы Android үшін жасап жатқан дүние осы. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "Google-дің sideloading жасауға арналған «кеңейтілген процесі» — шығу жолы емес, тосқауыл механизмі. Өз меншігіндегі бағдарлама үшін 9 қадам және 24 сағаттық күту? Жоқ рахмет. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "100 000-нан астам адам мен 67-ден астам ұйым Google-дің Android-ты бұғаттау әрекетіне қарсы тұруда. Шынымен ашық мобильді экожүйе үшін күреске қосылыңыз. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"

social_callout_facebook_1: "2026 жылдың қыркүйегінен бастап Google барлық Android қосымша әзірлеушілерінен орталықтан тіркелуді және мемлекеттік куәлік ұсынуды талап етеді. Тіркелмеген әзірлеушілердің қосымшалары дүниежүзіндегі барлық сертификатталған Android құрылғыларда бұғатталады. Бұл тек Play Store қосымшаларына ғана емес — барлығына қатысты. Толығырақ: {url}"
social_callout_facebook_2: "Миллиондар пайдаланатын ашық бастапқы кодты Android қосымшалар дүкені F-Droid Google-дің тексерісін «тіршілікке қауіп» деп атайды. EFF, FSF және Tor Project-ті қоса 67-ден астам ұйым бұл саясатқа қарсылық білдіретін ашық хатқа қол қойды. {url}"
social_callout_facebook_3: "Google-дің тексерілмеген қосымшаларды орнатуға арналған айналым жолы 9 қадамды, міндетті 24 сағаттық күтуді талап етеді және Google кез келген уақытта өзгерте алатын Play Services арқылы жұмыс істейді. Қоғамдастыққа блог жазбасы қорғаныс ретінде қабылдауы сұралуда. {url}"
social_callout_facebook_4: "Android-тың ашықтығы 17 жыл бойы оның анықтаушы сипаттамасы болды. Миллиондар дәл сол себептен оны iPhone-нан таңдады. Google енді барлық қосымшалар, соның ішінде Play Store-тан тыс таратылғандары үшін тіркелуді міндетті етуде. {url}"
social_callout_facebook_5: "EFF қосымша кіріс бақылауын «цензураға жол» деп атайды. Google-дің тексерісі бір компанияға дүниежүзіндегі кез келген сертификатталған құрылғыда кез келген қосымшаны бұғаттауға мүмкіндік береді. Бұл тек Android-тан тыс жеке компьютерлендірудің болашағына дейін созылатын прецедент. {url}"
social_callout_facebook_6: "Телефоныңыз — сіздің таңдауыңыз ба? Егер Google шешсе — жоқ. 2026 жылдан бастап олар тіркелмеген әзірлеушінің кез келген қосымшасын бұғаттауды жоспарлайды. Бұл барлығына қатысты. {url}"
social_callout_facebook_7: "Google ашық платформа ретінде сатылған миллиардтаған құрылғыларды кері бұғаттауда. Бұл «rug pull» тәуелсіз әзірлеушілер мен F-Droid сияқты баламалы дүкендеріне қауіп төндіреді. {url}"
social_callout_facebook_8: "Телефоныңыз шынымен сіздікі ме? Егер Google қандай қосымшаны орнатуға болатынын шеше алса, жауап — жоқ. Android-ты ашық сақтау үшін күресіп жатқан 100 000-нан астам адамға қосылыңыз. {url}"
social_callout_facebook_9: "Google-дің тексерілмеген қосымшаларға «рұқсат беру» процесінің 9 қадамы — тұзақ. Ешкім пайдаланбауы үшін қолайсыз етіп жасалған, Google-ге толық бақылауды беруде. {url}"
social_callout_facebook_10: "Алғашқы қосымшаларын жасаушы студенттерден бастап құпиялылық құралдарын жасаушы еріктілерге дейін Google-дің міндетті тіркелу саясаты инновацияны тоқтатады. Android-ты ашық сақтауға көмектесіңіз! {url}"

